name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: experiments
          POSTGRES_PASSWORD: experiments
          POSTGRES_DB: experiments
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U experiments"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_ADMIN_URL: postgresql://experiments:experiments@localhost:5432/experiments

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/

  deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --app chuk-experiments-server
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  smoke-test:
    # Catches schema drift specifically: a migration merged in the same push
    # as code that depends on it, but `flyctl deploy` only restarts the
    # container — it never runs `migrate` against production, so a missed
    # manual migrate step leaves new columns/tables missing until something
    # 500s. See scripts/smoke_test.py and the 2026-07-20 get_experiment
    # incident (migration 011 shipped, never applied, get_experiment broke
    # for every experiment until caught by hand).
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install httpx
      - run: python scripts/smoke_test.py --api-key "$CHUK_EXPERIMENTS_SMOKE_KEY"
        env:
          CHUK_EXPERIMENTS_SMOKE_KEY: ${{ secrets.CHUK_EXPERIMENTS_SMOKE_KEY }}
