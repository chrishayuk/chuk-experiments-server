name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: experiments
          POSTGRES_PASSWORD: experiments
          POSTGRES_DB: experiments
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U experiments"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_ADMIN_URL: postgresql://experiments:experiments@localhost:5432/experiments

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/

  deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --app chuk-experiments-server
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        # Migrations now run as part of this deploy itself, via fly.toml's
        # [deploy] release_command — see that file for why (an earlier
        # version of this job tried a separate `flyctl ssh console` step
        # here instead, which failed: this app autostops idle machines
        # (min_machines_running=0), so the app machine had already stopped
        # itself again by the time ssh console tried to attach, seconds
        # after the deploy's own health check passed).

  smoke-test:
    # Second line of defense, not the primary fix — migrations now apply
    # automatically as part of `deploy` above (fly.toml's release_command).
    # This still catches whatever that doesn't (e.g. it failing silently,
    # or a schema change too structural to be a plain additive migration).
    # See scripts/smoke_test.py and the 2026-07-20 get_experiment incident
    # (migration 011 shipped, never applied, get_experiment broke for every
    # experiment until caught by hand and fixed manually — this workflow
    # automates that fix).
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install httpx
      - run: python scripts/smoke_test.py --api-key "$CHUK_EXPERIMENTS_SMOKE_KEY"
        env:
          CHUK_EXPERIMENTS_SMOKE_KEY: ${{ secrets.CHUK_EXPERIMENTS_SMOKE_KEY }}
