<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}chuk-experiments{% endblock %}</title>
<style>
  :root {
    color-scheme: light dark;
    --fg: #1a1a1a; --bg: #ffffff; --muted: #666; --border: #ddd;
    --accent: #2563eb; --card: #f7f7f8; --code-bg: #f1f1f3;
  }
  @media (prefers-color-scheme: dark) {
    :root { --fg: #e4e4e7; --bg: #131316; --muted: #9a9aa2; --border: #2c2c33;
             --accent: #6d9dff; --card: #1c1c22; --code-bg: #1f1f26; }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--fg); background: var(--bg); margin: 0; line-height: 1.5;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  header {
    display: flex; align-items: center; gap: 1.5rem;
    padding: 0.85rem 1.5rem; border-bottom: 1px solid var(--border);
  }
  header .brand { font-weight: 600; }
  header nav { display: flex; gap: 1rem; flex: 1; }
  header .user { color: var(--muted); font-size: 0.9rem; }
  main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
  table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
  th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; }
  tr:hover { background: var(--card); }
  .card { background: var(--card); border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .tag {
    display: inline-block; font-size: 0.75rem; padding: 0.1rem 0.5rem;
    border-radius: 999px; background: var(--code-bg); color: var(--muted); margin: 0.1rem;
  }
  .status { font-weight: 600; }
  .status-completed { color: #16a34a; }
  .status-running, .status-claimed, .status-queued { color: #d97706; }
  .status-failed, .status-killed, .status-lost, .status-abandoned { color: #dc2626; }
  .status-cancelled, .status-superseded { color: var(--muted); }
  input, select, button {
    font: inherit; padding: 0.4rem 0.6rem; border: 1px solid var(--border);
    border-radius: 6px; background: var(--bg); color: var(--fg);
  }
  button, .button {
    background: var(--accent); color: white; border: none; cursor: pointer;
  }
  form.filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .writeup { max-width: 75ch; }
  .writeup pre { background: var(--code-bg); padding: 0.75rem; border-radius: 6px; overflow-x: auto; }
  .writeup code { background: var(--code-bg); padding: 0.1rem 0.3rem; border-radius: 4px; }
  .muted { color: var(--muted); }
  .empty { color: var(--muted); font-style: italic; padding: 2rem 0; text-align: center; }
</style>
{% block head %}{% endblock %}
</head>
<body>
<header>
  <span class="brand">chuk-experiments</span>
  <nav>
    <a href="/">Overview</a>
    <a href="/experiments">Experiments</a>
    <a href="/search">Search</a>
  </nav>
  {% if user_email %}
    <span class="user">{{ user_email }} · <a href="/logout">Sign out</a></span>
  {% endif %}
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
