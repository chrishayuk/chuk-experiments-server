<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>chuk-experiments</title>
<style>
  :root {
    --plane:#0d0d0d; --surface:#1a1a19; --surface2:#212120; --ink:#f4f3ee; --ink2:#c3c2b7;
    --muted:#898781; --grid:#2c2c2a; --ring:rgba(255,255,255,.10); --ring2:rgba(255,255,255,.16);
    --good:#22b45a; --warning:#fab219; --serious:#ec835a; --critical:#e0483d;
    --accent:#3987e5; --accent2:#2bb1a8;
    --mono: ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans: system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: var(--sans); font-size: 14px; line-height: 1.5;
    color: var(--ink); background: var(--plane); -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  h2, h3 { font-weight: 650; }
  .mono, .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  header {
    display: flex; align-items: center; gap: .9rem; padding: .85rem 1.4rem;
    border-bottom: 1px solid var(--ring); position: sticky; top: 0;
    background: rgba(13,13,13,.86); backdrop-filter: blur(8px); z-index: 20;
  }
  header .brand { font-weight: 700; letter-spacing: .02em; }
  header .brand b { color: var(--accent); }
  header .tag { color: var(--muted); font-size: .82rem; }
  header nav { display: flex; gap: 1rem; }
  header .spacer { flex: 1; }
  header .user { color: var(--muted); font-size: .82rem; }
  header .user a { color: var(--muted); }

  main { max-width: 1180px; margin: 0 auto; padding: 1.4rem 1.4rem 3rem; }

  .eyebrow { font-size: .7rem; letter-spacing: .09em; text-transform: uppercase; color: var(--muted);
    font-weight: 600; margin: 0 0 .55rem; }
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: .7rem; margin-bottom: 1.2rem; }
  .tile { background: var(--surface); border: 1px solid var(--ring); border-radius: 12px; padding: .8rem .95rem; text-decoration: none; color: inherit; display: block; }
  .tile .v { font-size: 1.6rem; font-weight: 650; font-family: var(--mono); font-variant-numeric: tabular-nums; line-height: 1.1; }
  .tile .l { color: var(--muted); font-size: .78rem; margin-top: .15rem; }

  table { border-collapse: collapse; width: 100%; margin: .9rem 0; font-size: .88rem; }
  th, td { text-align: left; padding: .55rem .8rem; border-bottom: 1px solid var(--grid); }
  th { color: var(--muted); font-weight: 600; font-size: .7rem; letter-spacing: .05em; text-transform: uppercase; }
  tr:hover td { background: var(--surface2); }
  tr.click { cursor: pointer; }

  .card {
    background: var(--surface); border: 1px solid var(--ring); border-radius: 12px;
    padding: 1rem 1.2rem; margin-bottom: 1rem;
  }
  .card > strong { display: block; font-size: .7rem; letter-spacing: .07em; text-transform: uppercase;
    color: var(--muted); font-weight: 600; margin-bottom: .5rem; }
  .card .hd { display: flex; align-items: center; gap: .6rem; margin-bottom: .3rem; }
  .card .hd h3 { margin: 0; }

  .chip {
    display: inline-flex; align-items: center; gap: .35rem; font-family: var(--mono); font-size: .74rem;
    background: var(--surface2); border: 1px solid var(--ring); border-radius: 999px;
    padding: .12rem .55rem; color: var(--ink2); margin: .1rem;
  }
  .chip.r2 { color: var(--serious); border-color: var(--serious); }
  .chip.drive { color: var(--accent2); border-color: var(--accent2); }
  .chip.git, .chip.hf { color: var(--accent); border-color: var(--accent); }
  .tag { display: inline-block; font-size: .74rem; padding: .12rem .55rem; border-radius: 999px;
    background: var(--surface2); border: 1px solid var(--ring); color: var(--ink2); margin: .1rem; }

  .st { display: inline-flex; align-items: center; gap: .42rem; font-size: .85rem; white-space: nowrap; }
  .st::before { content: ""; width: .5rem; height: .5rem; border-radius: 50%; background: var(--muted); flex: none; }
  .st.good::before { background: var(--good); }
  .st.run::before { background: var(--accent); }
  .st.bad::before { background: var(--critical); }
  .st.warn::before { background: var(--warning); }
  .st.mut::before { background: var(--muted); }

  input, select, button {
    font: inherit; padding: .4rem .6rem; border: 1px solid var(--ring2);
    border-radius: 7px; background: var(--surface); color: var(--ink);
  }
  button, .button {
    background: var(--accent); color: #0d0d0d; font-weight: 600; border: none; cursor: pointer;
    border-radius: 8px;
  }
  button:hover, .button:hover { text-decoration: none; filter: brightness(1.1); }
  .filters { display: flex; gap: .6rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
  .filters form { display: inline-flex; gap: .4rem; }

  .chip-row { display: flex; gap: .35rem; flex-wrap: wrap; }
  .chip-filter {
    display: inline-flex; align-items: center; font-size: .8rem; padding: .3rem .75rem;
    border-radius: 999px; border: 1px solid var(--ring2); color: var(--ink2); background: var(--surface);
  }
  .chip-filter:hover { text-decoration: none; background: var(--surface2); }
  .chip-filter.active { border-color: var(--accent); color: var(--ink); background: var(--surface2); }

  th a { color: inherit; }
  th a:hover { text-decoration: underline; }

  .pager { display: flex; align-items: center; gap: .9rem; margin: .9rem 0; font-size: .85rem; }
  .pager span.muted { font-family: var(--mono); }

  .writeup { max-width: 75ch; color: var(--ink2); }
  .writeup pre { background: #0a0a0a; border: 1px solid var(--grid); padding: .75rem; border-radius: 8px; overflow-x: auto; }
  .writeup code { background: var(--surface2); padding: .1rem .3rem; border-radius: 4px; font-family: var(--mono); }
  pre { background: #0a0a0a; border: 1px solid var(--grid); padding: .75rem; border-radius: 8px;
    overflow-x: auto; font-family: var(--mono); font-size: .82rem; color: var(--ink2); }

  /* Labeled key/value rendering for design/config/workspec — scannable
     sections instead of one raw JSON blob. */
  dl.kv { margin: 0; }
  dl.kv dt { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; color: var(--muted);
    font-weight: 600; margin-top: .7rem; }
  dl.kv dt:first-child { margin-top: 0; }
  dl.kv dd { margin: .25rem 0 0; }
  dl.kv ul { margin: .2rem 0 0; padding-left: 1.1rem; }
  dl.kv li { margin: .2rem 0; }
  dl.kv dl.kv { margin-left: .9rem; margin-top: .3rem; }

  .muted { color: var(--muted); }
  .empty { color: var(--muted); font-style: italic; padding: 2rem 0; text-align: center; }
  .err { color: var(--critical); }
</style>
</head>
<body>
<header>
  <span class="brand">chuk-<b>experiments</b></span><span class="tag">research registry</span>
  <nav>
    <a href="#/">Overview</a>
    <a href="#/experiments">Experiments</a>
    <a href="#/search">Search</a>
    <a href="#/pins">Pins</a>
    <a href="#/external-refs">External refs</a>
    <a href="#/team">Team</a>
  </nav>
  <span class="spacer"></span>
  {% if user_email %}
    <span class="user">{{ user_email }} · <a href="/logout">Sign out</a></span>
  {% endif %}
</header>
<main id="app"><p class="muted">Loading…</p></main>
<script>
/* Server-injected constants (see web.py's app_shell) — the only templating
   in this page's JS; everything else below is plain static files with zero
   server-side templating, loaded via <script src>. */
const STATUS_CLASS={{ status_class_json | safe }};
const EXPERIMENT_STATUSES={{ experiment_statuses_json | safe }};
const ROLE_SCOPE_CEILING={{ role_scope_ceiling_json | safe }};
</script>
<script src="/static/app-core.js"></script>
<script src="/static/app-overview.js"></script>
<script src="/static/app-experiments.js"></script>
<script src="/static/app-runs.js"></script>
<script src="/static/app-search.js"></script>
<script src="/static/app-pins.js"></script>
<script src="/static/app-external-refs.js"></script>
<script src="/static/app-team.js"></script>
<script src="/static/app-router.js"></script>
</body>
</html>
