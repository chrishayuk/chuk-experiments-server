<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>chuk-experiments</title>
<style>
  :root {
    --plane:#0d0d0d; --surface:#1a1a19; --surface2:#212120; --ink:#f4f3ee; --ink2:#c3c2b7;
    --muted:#898781; --grid:#2c2c2a; --ring:rgba(255,255,255,.10); --ring2:rgba(255,255,255,.16);
    --good:#22b45a; --warning:#fab219; --serious:#ec835a; --critical:#e0483d;
    --accent:#3987e5; --accent2:#2bb1a8;
    --mono: ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans: system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: var(--sans); font-size: 14px; line-height: 1.5;
    color: var(--ink); background: var(--plane); -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  h2, h3 { font-weight: 650; }
  .mono, .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  header {
    display: flex; align-items: center; gap: .9rem; padding: .85rem 1.4rem;
    border-bottom: 1px solid var(--ring); position: sticky; top: 0;
    background: rgba(13,13,13,.86); backdrop-filter: blur(8px); z-index: 20;
  }
  header .brand { font-weight: 700; letter-spacing: .02em; }
  header .brand b { color: var(--accent); }
  header .tag { color: var(--muted); font-size: .82rem; }
  header nav { display: flex; gap: 1rem; }
  header .spacer { flex: 1; }
  header .user { color: var(--muted); font-size: .82rem; }
  header .user a { color: var(--muted); }

  main { max-width: 1180px; margin: 0 auto; padding: 1.4rem 1.4rem 3rem; }

  .eyebrow { font-size: .7rem; letter-spacing: .09em; text-transform: uppercase; color: var(--muted);
    font-weight: 600; margin: 0 0 .55rem; }
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: .7rem; margin-bottom: 1.2rem; }
  .tile { background: var(--surface); border: 1px solid var(--ring); border-radius: 12px; padding: .8rem .95rem; }
  .tile .v { font-size: 1.6rem; font-weight: 650; font-family: var(--mono); font-variant-numeric: tabular-nums; line-height: 1.1; }
  .tile .l { color: var(--muted); font-size: .78rem; margin-top: .15rem; }

  table { border-collapse: collapse; width: 100%; margin: .9rem 0; font-size: .88rem; }
  th, td { text-align: left; padding: .55rem .8rem; border-bottom: 1px solid var(--grid); }
  th { color: var(--muted); font-weight: 600; font-size: .7rem; letter-spacing: .05em; text-transform: uppercase; }
  tr:hover td { background: var(--surface2); }
  tr.click { cursor: pointer; }

  .card {
    background: var(--surface); border: 1px solid var(--ring); border-radius: 12px;
    padding: 1rem 1.2rem; margin-bottom: 1rem;
  }
  .card > strong { display: block; font-size: .7rem; letter-spacing: .07em; text-transform: uppercase;
    color: var(--muted); font-weight: 600; margin-bottom: .5rem; }
  .card .hd { display: flex; align-items: center; gap: .6rem; margin-bottom: .3rem; }
  .card .hd h3 { margin: 0; }

  .chip {
    display: inline-flex; align-items: center; gap: .35rem; font-family: var(--mono); font-size: .74rem;
    background: var(--surface2); border: 1px solid var(--ring); border-radius: 999px;
    padding: .12rem .55rem; color: var(--ink2); margin: .1rem;
  }
  .chip.r2 { color: var(--serious); border-color: var(--serious); }
  .chip.drive { color: var(--accent2); border-color: var(--accent2); }
  .tag { display: inline-block; font-size: .74rem; padding: .12rem .55rem; border-radius: 999px;
    background: var(--surface2); border: 1px solid var(--ring); color: var(--ink2); margin: .1rem; }

  .st { display: inline-flex; align-items: center; gap: .42rem; font-size: .85rem; white-space: nowrap; }
  .st::before { content: ""; width: .5rem; height: .5rem; border-radius: 50%; background: var(--muted); flex: none; }
  .st.good::before { background: var(--good); }
  .st.run::before { background: var(--accent); }
  .st.bad::before { background: var(--critical); }
  .st.warn::before { background: var(--warning); }
  .st.mut::before { background: var(--muted); }

  input, select, button {
    font: inherit; padding: .4rem .6rem; border: 1px solid var(--ring2);
    border-radius: 7px; background: var(--surface); color: var(--ink);
  }
  button, .button {
    background: var(--accent); color: #0d0d0d; font-weight: 600; border: none; cursor: pointer;
    border-radius: 8px;
  }
  button:hover, .button:hover { text-decoration: none; filter: brightness(1.1); }
  .filters { display: flex; gap: .6rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
  .filters form { display: inline-flex; gap: .4rem; }

  .chip-row { display: flex; gap: .35rem; flex-wrap: wrap; }
  .chip-filter {
    display: inline-flex; align-items: center; font-size: .8rem; padding: .3rem .75rem;
    border-radius: 999px; border: 1px solid var(--ring2); color: var(--ink2); background: var(--surface);
  }
  .chip-filter:hover { text-decoration: none; background: var(--surface2); }
  .chip-filter.active { border-color: var(--accent); color: var(--ink); background: var(--surface2); }

  th a { color: inherit; }
  th a:hover { text-decoration: underline; }

  .pager { display: flex; align-items: center; gap: .9rem; margin: .9rem 0; font-size: .85rem; }
  .pager span.muted { font-family: var(--mono); }

  .writeup { max-width: 75ch; color: var(--ink2); }
  .writeup pre { background: #0a0a0a; border: 1px solid var(--grid); padding: .75rem; border-radius: 8px; overflow-x: auto; }
  .writeup code { background: var(--surface2); padding: .1rem .3rem; border-radius: 4px; font-family: var(--mono); }
  pre { background: #0a0a0a; border: 1px solid var(--grid); padding: .75rem; border-radius: 8px;
    overflow-x: auto; font-family: var(--mono); font-size: .82rem; color: var(--ink2); }

  .muted { color: var(--muted); }
  .empty { color: var(--muted); font-style: italic; padding: 2rem 0; text-align: center; }
  .err { color: var(--critical); }
</style>
</head>
<body>
<header>
  <span class="brand">chuk-<b>experiments</b></span><span class="tag">research registry</span>
  <nav>
    <a href="#/">Overview</a>
    <a href="#/experiments">Experiments</a>
    <a href="#/search">Search</a>
    <a href="#/pins">Pins</a>
    <a href="#/team">Team</a>
  </nav>
  <span class="spacer"></span>
  {% if user_email %}
    <span class="user">{{ user_email }} · <a href="/logout">Sign out</a></span>
  {% endif %}
</header>
<main id="app"><p class="muted">Loading…</p></main>
<script>
const $=(s,r=document)=>r.querySelector(s);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmtDt=v=>v?String(v).slice(0,16).replace("T"," "):"—";
const fmtCost=v=>(v===null||v===undefined)?"—":"$"+Number(v).toFixed(4);

/* Mirrors constants.STATUS_CSS_CLASS — kept in sync by hand, both are
   small and static. */
const STATUS_CLASS={draft:"mut",planned:"mut",running:"run",completed:"good",abandoned:"bad",
  superseded:"mut",queued:"mut",claimed:"run",failed:"bad",killed:"bad",lost:"bad",cancelled:"mut"};
const pill=s=>`<span class="st ${STATUS_CLASS[s]||"mut"}">${esc(s)}</span>`;

async function api(path,options){
  const r=await fetch(path,options&&options.body
    ?{...options,headers:{"Content-Type":"application/json",...options.headers}}
    :options);
  let body=null;
  try{body=await r.json();}catch(e){/* non-JSON error body */}
  if(!r.ok)throw new Error((body&&body.error)||("http_"+r.status));
  return body;
}

/* Fixed page size, real offset-based paging (not a growing "load more") —
   each page issues its own bounded query so page 20 costs the same as
   page 1. Fetches PAGE_SIZE+1 rows to detect a next page without a
   separate count query. */
const PAGE_SIZE=25;
function pagerHtml(hashPath,baseParams,offset,count,hasMore){
  const prevParams=new URLSearchParams(baseParams);
  prevParams.set("offset",String(Math.max(0,offset-PAGE_SIZE)));
  const nextParams=new URLSearchParams(baseParams);
  nextParams.set("offset",String(offset+PAGE_SIZE));
  const from=count?offset+1:0;
  const to=offset+count;
  return `<div class="pager">
    ${offset>0?`<a href="#${hashPath}?${prevParams}">&larr; Prev</a>`:`<span class="muted">&larr; Prev</span>`}
    <span class="muted">${from}&ndash;${to}</span>
    ${hasMore?`<a href="#${hashPath}?${nextParams}">Next &rarr;</a>`:`<span class="muted">Next &rarr;</span>`}
  </div>`;
}

/* ---------------- overview ---------------- */
async function loadOverview(){
  let programmes,recent,running;
  try{
    [programmes,recent,running]=await Promise.all([
      api("/v1/programmes"),
      api("/v1/experiments?limit=10"),
      api("/v1/experiments?"+new URLSearchParams({status:"running",limit:"10"})),
    ]);
  }catch(e){$("#app").innerHTML=`<p class="err">Failed to load overview: ${esc(e.message)}</p>`;return;}

  const totalExperiments=programmes.reduce((sum,p)=>sum+(p.experiment_count||0),0);
  const tiles=[["Programmes",programmes.length],["Total experiments",totalExperiments],
    ["Currently running",running.length]];
  const tilesH=tiles.map(([l,v])=>`<div class="tile"><div class="v">${esc(v)}</div><div class="l">${esc(l)}</div></div>`).join("");

  const progRows=programmes.map(p=>`<tr class="click" onclick="location.hash='#/experiments?programme='+encodeURIComponent('${esc(p.slug)}')"><td><a href="#/experiments?programme=${encodeURIComponent(p.slug)}">${esc(p.name)}</a></td><td class="num">${esc(p.experiment_count)}</td></tr>`).join("")
    ||`<tr><td colspan="2" class="empty">No programmes yet</td></tr>`;
  const recentRows=recent.map(experimentRow).join("")||`<tr><td colspan="4" class="empty">Nothing yet</td></tr>`;
  const runningRows=running.map(experimentRow).join("");

  $("#app").innerHTML=`
    <section><p class="eyebrow">Health</p><div class="tiles">${tilesH}</div></section>
    <section><div class="card"><div class="hd"><h3>Programmes</h3></div>
      <table><tr><th>Programme</th><th>Experiments</th></tr>${progRows}</table></div></section>
    <section><div class="card"><div class="hd"><h3>Recently updated</h3></div>
      <table><tr><th>Experiment</th><th>Programme</th><th>Status</th><th>Updated</th></tr>${recentRows}</table></div></section>
    ${running.length?`<section><div class="card"><div class="hd"><h3>Currently running</h3></div>
      <table><tr><th>Experiment</th><th>Programme</th><th>Status</th><th>Updated</th></tr>${runningRows}</table></div></section>`:""}
  `;
}

function experimentRow(e){
  return `<tr><td><a href="#/experiments/${encodeURIComponent(e.slug)}">${esc(e.title)}</a></td><td>${esc(e.programme_slug)}</td><td>${pill(e.status)}</td><td class="muted">${fmtDt(e.updated_at)}</td></tr>`;
}

/* ---------------- experiments list ---------------- */
const EXPERIMENT_STATUSES=["draft","planned","running","completed","abandoned","superseded"];

/* Mirrors constants.DEFAULT_EXPERIMENT_SORT/DEFAULT_EXPERIMENT_ORDER — kept
   in sync by hand. Clicking an inactive column sorts it ascending; clicking
   the already-active column flips direction. */
function sortHeader(basePath,params,column,label){
  const currentSort=params.get("sort")||"updated_at";
  const currentOrder=params.get("order")||"desc";
  const isActive=currentSort===column;
  const nextOrder=isActive&&currentOrder==="asc"?"desc":"asc";
  const p=new URLSearchParams(params);
  p.set("sort",column);p.set("order",nextOrder);p.delete("offset");
  const arrow=isActive?(currentOrder==="asc"?" ▲":" ▼"):"";
  return `<a href="#${basePath}?${p}">${esc(label)}${arrow}</a>`;
}

async function loadExperimentsList(params){
  const programme=params.get("programme")||"";
  const status=params.get("status")||"";
  const tag=params.get("tag")||"";
  const sort=params.get("sort")||"updated_at";
  const order=params.get("order")||"desc";
  const offset=Math.max(0,parseInt(params.get("offset")||"0",10)||0);

  let experiments,programmes;
  try{
    const apiParams=new URLSearchParams({limit:String(PAGE_SIZE+1),offset:String(offset),sort,order});
    if(programme)apiParams.set("programme",programme);
    if(status)apiParams.set("status",status);
    if(tag)apiParams.set("tag",tag);
    [experiments,programmes]=await Promise.all([api("/v1/experiments?"+apiParams),api("/v1/programmes")]);
  }catch(e){$("#app").innerHTML=`<p class="err">Failed to load experiments: ${esc(e.message)}</p>`;return;}

  const hasMore=experiments.length>PAGE_SIZE;
  experiments=experiments.slice(0,PAGE_SIZE);

  const rows=experiments.map(e=>`<tr><td><a href="#/experiments/${encodeURIComponent(e.slug)}">${esc(e.title)}</a></td><td>${esc(e.programme_slug)}</td><td>${pill(e.status)}</td><td>${(e.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</td><td class="muted">${fmtDt(e.updated_at)}</td></tr>`).join("")
    ||`<tr><td colspan="5" class="empty">No experiments match these filters</td></tr>`;

  /* Everything except offset — shared by sort headers and the pager
     (pagerHtml adds its own offset on top). */
  const sortParams=new URLSearchParams();
  if(programme)sortParams.set("programme",programme);
  if(status)sortParams.set("status",status);
  if(tag)sortParams.set("tag",tag);
  sortParams.set("sort",sort);sortParams.set("order",order);

  const statusChips=[["","all"]].concat(EXPERIMENT_STATUSES.map(s=>[s,s])).map(([value,label])=>{
    const p=new URLSearchParams(sortParams);
    p.delete("status");p.delete("offset");
    if(value)p.set("status",value);
    return `<a class="chip-filter${value===status?" active":""}" href="#/experiments?${p}">${esc(label)}</a>`;
  }).join("");

  const progOptions=programmes.map(p=>`<option value="${esc(p.slug)}" ${p.slug===programme?"selected":""}>${esc(p.name)}</option>`).join("");

  $("#app").innerHTML=`
    <h2>Experiments</h2>
    <div class="filters">
      <div class="chip-row" id="status-chips">${statusChips}</div>
      <select id="programme-select"><option value="">All programmes</option>${progOptions}</select>
      <form id="tag-form">
        <input type="text" name="tag" placeholder="tag" value="${esc(tag)}">
        <button type="submit">Go</button>
      </form>
      ${(programme||status||tag)?`<a href="#/experiments">Clear</a>`:""}
    </div>
    <table><tr>
      <th>${sortHeader("/experiments",sortParams,"title","Experiment")}</th>
      <th>${sortHeader("/experiments",sortParams,"programme_slug","Programme")}</th>
      <th>${sortHeader("/experiments",sortParams,"status","Status")}</th>
      <th>Tags</th>
      <th>${sortHeader("/experiments",sortParams,"updated_at","Updated")}</th>
    </tr>${rows}</table>
    ${pagerHtml("/experiments",sortParams,offset,experiments.length,hasMore)}
  `;
  $("#programme-select").addEventListener("change",ev=>{
    const p=new URLSearchParams(sortParams);
    p.delete("offset");
    if(ev.target.value)p.set("programme",ev.target.value);else p.delete("programme");
    location.hash="#/experiments?"+p;
  });
  $("#tag-form").addEventListener("submit",ev=>{
    ev.preventDefault();
    const v=new FormData(ev.target).get("tag");
    const p=new URLSearchParams(sortParams);
    p.delete("offset");
    if(v)p.set("tag",v);else p.delete("tag");
    location.hash="#/experiments?"+p;
  });
}

/* ---------------- experiment detail ---------------- */
async function loadExperimentDetail(slug){
  let experiment;
  try{experiment=await api("/v1/experiments/"+encodeURIComponent(slug));}
  catch(e){$("#app").innerHTML=`<h1>Not found</h1><p class="err">${esc(e.message)}</p>`;return;}

  const writeup=experiment.latest_writeup;
  const hasDesign=experiment.design&&Object.keys(experiment.design).length;
  const runsRows=(experiment.runs||[]).map(r=>`<tr><td><a href="#/runs/${encodeURIComponent(r.id)}" class="mono">${esc(r.slug)}</a></td><td>${pill(r.status)}</td><td>${esc(r.backend||"—")}</td><td>${fmtCost(r.cost_usd)}</td><td>${r.wandb_url?`<a href="${esc(r.wandb_url)}" target="_blank" rel="noopener">dashboard</a>`:"—"}</td></tr>`).join("")
    ||`<tr><td colspan="5" class="empty">No runs yet</td></tr>`;

  $("#app").innerHTML=`
    <p class="muted"><a href="#/experiments?programme=${encodeURIComponent(experiment.programme_slug)}">${esc(experiment.programme_name)}</a> / ${esc(experiment.slug)}</p>
    <h2>${esc(experiment.title)}</h2>
    <p>${pill(experiment.status)} ${(experiment.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</p>
    ${experiment.hypothesis?`<div class="card"><strong>Hypothesis</strong><p>${esc(experiment.hypothesis)}</p></div>`:""}
    ${hasDesign?`<div class="card"><strong>Design</strong><pre>${esc(JSON.stringify(experiment.design,null,2))}</pre></div>`:""}
    <h3>Write-up ${writeup?`<span class="muted">(v${writeup.version}, ${esc(writeup.author)})</span>`:""}</h3>
    ${writeup?`<div class="writeup">${writeup.body_html}</div>`:`<p class="empty">No write-up yet</p>`}
    <h3>Runs</h3>
    <table><tr><th>Run</th><th>Status</th><th>Backend</th><th>Cost</th><th>W&amp;B</th></tr>${runsRows}</table>
  `;
}

/* ---------------- run detail ---------------- */
async function loadRunDetail(id){
  let run;
  try{run=await api("/v1/runs/"+encodeURIComponent(id));}
  catch(e){$("#app").innerHTML=`<h1>Not found</h1><p class="err">${esc(e.message)}</p>`;return;}

  const resultsRows=(run.results||[]).map(r=>`<tr><td>${esc(r.name)}</td><td>${r.value!=null?esc(r.value):(r.value_json?esc(JSON.stringify(r.value_json)):"—")}</td><td>${esc(r.verdict||"—")}</td><td class="muted">${esc(r.notes||"—")}</td><td class="muted">${esc(r.submitted_by)}</td></tr>`).join("")
    ||`<tr><td colspan="5" class="empty">No results yet</td></tr>`;

  /* Lineage is only meaningful for named (dedup-eligible) artifacts — skip
     the extra request for the common case of a one-off unnamed pointer.
     Pins are fetched in full alongside it — cheap today, and cross-
     referencing client-side avoids a per-artifact "is this pinned" route. */
  const artifacts=run.artifacts||[];
  const lineageByArtifactId={};
  let pins=[];
  await Promise.all([
    ...artifacts.filter(a=>a.name).map(async a=>{
      try{lineageByArtifactId[a.id]=await api(`/v1/artifacts/${a.id}/lineage`);}catch(e){/* best-effort */}
    }),
    (async()=>{try{pins=await api("/v1/pins");}catch(e){/* best-effort */}})(),
  ]);
  const pinNamesByArtifactId={};
  pins.forEach(p=>{(pinNamesByArtifactId[p.artifact_id]=pinNamesByArtifactId[p.artifact_id]||[]).push(p.name);});

  const artifactsRows=artifacts.map(a=>{
    const lineage=lineageByArtifactId[a.id];
    const usedByCount=lineage?lineage.used_by_run_ids.length:0;
    const pinBadges=(pinNamesByArtifactId[a.id]||[]).map(n=>`<span class="tag">pinned: ${esc(n)}</span>`).join(" ");
    const nameCell=a.name?`${esc(a.name)}${usedByCount?`<br><span class="muted">used by ${usedByCount} other run${usedByCount!==1?"s":""}</span>`:""}${pinBadges?`<br>${pinBadges}`:""}`:"—";
    if(String(a.uri||"").startsWith("gdrive://")){
      const path=(a.meta&&a.meta.source_path)||a.uri;
      return `<tr><td>${esc(a.kind)}</td><td>${nameCell}</td><td><span class="chip drive">Drive · archive</span></td><td class="muted mono">${esc(path)}</td><td><a href="/v1/artifacts/${a.id}/download" target="_blank" rel="noopener">open in Drive</a></td></tr>`;
    }
    return `<tr><td>${esc(a.kind)}</td><td>${nameCell}</td><td><span class="chip r2">R2</span></td><td class="muted mono">${esc(a.uri)}</td><td><a href="/v1/artifacts/${a.id}/download">download</a></td></tr>`;
  }).join("")||`<tr><td colspan="5" class="empty">No artifacts yet</td></tr>`;

  const hasConfig=run.config&&Object.keys(run.config).length;
  const hasWorkspec=run.workspec&&Object.keys(run.workspec).length;

  $("#app").innerHTML=`
    <p class="muted"><a href="#/experiments/${encodeURIComponent(run.experiment_slug)}">${esc(run.experiment_title)}</a> / <span class="mono">${esc(run.slug)}</span></p>
    <h2 class="mono">${esc(run.slug)}</h2>
    <p>${pill(run.status)}</p>
    <div class="card"><table>
      <tr><td class="muted">Backend</td><td>${esc(run.backend||"—")}</td></tr>
      <tr><td class="muted">Priority</td><td>${esc(run.priority)}</td></tr>
      <tr><td class="muted">Cost</td><td>${fmtCost(run.cost_usd)}</td></tr>
      <tr><td class="muted">W&amp;B</td><td>${run.wandb_url?`<a href="${esc(run.wandb_url)}" target="_blank" rel="noopener">${esc(run.wandb_url)}</a>`:"—"}</td></tr>
      <tr><td class="muted">Started</td><td>${fmtDt(run.started_at)}</td></tr>
      <tr><td class="muted">Ended</td><td>${fmtDt(run.ended_at)}</td></tr>
      ${run.claimed_by?`<tr><td class="muted">Claimed by</td><td>${esc(run.claimed_by)}</td></tr>`:""}
    </table></div>
    ${hasConfig?`<div class="card"><strong>Config</strong><pre>${esc(JSON.stringify(run.config,null,2))}</pre></div>`:""}
    ${hasWorkspec?`<div class="card"><strong>Workspec</strong><pre>${esc(JSON.stringify(run.workspec,null,2))}</pre></div>`:""}
    <h3>Results</h3>
    <table><tr><th>Name</th><th>Value</th><th>Verdict</th><th>Notes</th><th>By</th></tr>${resultsRows}</table>
    <h3>Artifacts</h3>
    <table><tr><th>Kind</th><th>Name</th><th>Location</th><th>Path</th><th></th></tr>${artifactsRows}</table>
  `;
}

/* ---------------- search ---------------- */
async function loadSearch(params){
  const q=params.get("q")||"";
  const offset=Math.max(0,parseInt(params.get("offset")||"0",10)||0);
  let hits=[],hasMore=false;
  if(q){
    try{hits=await api("/v1/search?"+new URLSearchParams({q,limit:String(PAGE_SIZE+1),offset:String(offset)}));}
    catch(e){$("#app").innerHTML=`<p class="err">${esc(e.message)}</p>`;return;}
    hasMore=hits.length>PAGE_SIZE;
    hits=hits.slice(0,PAGE_SIZE);
  }
  const rows=hits.map(h=>`<tr><td><a href="#/experiments/${encodeURIComponent(h.slug)}">${esc(h.title)}</a></td><td>${esc(h.programme_slug)}</td><td>${pill(h.status)}</td><td class="muted">${h.snippet}</td></tr>`).join("")
    ||(q?`<tr><td colspan="4" class="empty">No matches for "${esc(q)}"</td></tr>`:"");

  const baseParams=new URLSearchParams();
  if(q)baseParams.set("q",q);

  $("#app").innerHTML=`
    <h2>Search</h2>
    <form class="filters" id="search-form">
      <input type="text" name="q" placeholder="free-text query" value="${esc(q)}" autofocus>
      <button type="submit">Search</button>
    </form>
    ${q?`<table><tr><th>Experiment</th><th>Programme</th><th>Status</th><th>Snippet</th></tr>${rows}</table>${pagerHtml("/search",baseParams,offset,hits.length,hasMore)}`:`<p class="muted">Full-text search across experiment titles, hypotheses, and write-ups.</p>`}
  `;
  $("#search-form").addEventListener("submit",ev=>{
    ev.preventDefault();
    const v=new FormData(ev.target).get("q");
    location.hash="#/search"+(v?"?q="+encodeURIComponent(v):"");
  });
}

/* ---------------- pins ---------------- */
async function loadPins(){
  let pins;
  try{pins=await api("/v1/pins");}
  catch(e){$("#app").innerHTML=`<p class="err">Failed to load pins: ${esc(e.message)}</p>`;return;}

  const rows=pins.map(p=>`<tr>
      <td class="mono">${esc(p.name)}</td>
      <td>${esc(p.artifact_name||"—")}</td>
      <td><span class="tag">${esc(p.kind)}</span></td>
      <td><a href="#/runs/${encodeURIComponent(p.run_id)}" class="mono">${esc(p.run_id)}</a></td>
      <td class="muted mono">${esc(p.uri)}</td>
      <td class="muted">${fmtDt(p.updated_at)}</td>
    </tr>`).join("")||`<tr><td colspan="6" class="empty">No pins yet</td></tr>`;

  $("#app").innerHTML=`
    <h2>Pins</h2>
    <p class="muted">Named, repointable aliases onto a specific artifact (W&amp;B-style
      "latest"/"best") — set via the set_pin MCP tool or <span class="mono">PUT /v1/pins/{name}</span>.</p>
    <table><tr><th>Pin</th><th>Artifact</th><th>Kind</th><th>Run</th><th>URI</th><th>Updated</th></tr>${rows}</table>
  `;
}

/* ---------------- team ---------------- */
/* Mirrors constants.ROLE_SCOPE_CEILING — kept in sync by hand: which scope
   checkboxes a given role is even allowed to see (the server enforces the
   same ceiling regardless — this is just so the form doesn't offer a
   choice it'll reject). */
const ROLE_SCOPE_CEILING={read:["read"],write:["read","write"],admin:["read","write","admin"]};

async function loadTeam(){
  let me,keys;
  try{[me,keys]=await Promise.all([api("/v1/me"),api("/v1/keys")]);}
  catch(e){$("#app").innerHTML=`<p class="err">Failed to load team: ${esc(e.message)}</p>`;return;}

  const mcpUrl=location.origin+"/mcp";

  const isAdmin=me.role==="admin";
  let users=[];
  if(isAdmin){
    try{users=await api("/v1/users");}
    catch(e){$("#app").innerHTML=`<p class="err">Failed to load users: ${esc(e.message)}</p>`;return;}
  }

  const scopeChoices=(ROLE_SCOPE_CEILING[me.role]||[]).map(s=>
    `<label><input type="checkbox" name="scope" value="${s}"> ${esc(s)}</label>`).join(" ");

  const keyRows=keys.map(k=>`<tr>
      <td>${esc(k.name)}</td>
      <td>${k.scopes.map(s=>`<span class="tag">${esc(s)}</span>`).join("")}</td>
      <td class="muted">${esc(k.created_by_email||"—")}</td>
      <td class="muted">${fmtDt(k.created_at)}</td>
      <td>${k.revoked_at?`<span class="st bad">revoked</span>`:`<button data-revoke-key="${k.id}">Revoke</button>`}</td>
    </tr>`).join("")||`<tr><td colspan="5" class="empty">No API keys yet</td></tr>`;

  const userRows=users.map(u=>`<tr>
      <td>${esc(u.email)}</td>
      <td><span class="tag">${esc(u.role)}</span></td>
      <td class="muted">${fmtDt(u.created_at)}</td>
      <td>${u.revoked_at?`<span class="st bad">revoked</span>`:`<button data-revoke-user="${u.id}">Revoke</button>`}</td>
    </tr>`).join("")||`<tr><td colspan="4" class="empty">No other users yet</td></tr>`;

  $("#app").innerHTML=`
    <h2>Team</h2>
    <p class="muted">Signed in as ${me.email?esc(me.email):"a bearer admin key"} &middot; role <span class="tag">${esc(me.role)}</span></p>

    <div class="card">
      <div class="hd"><h3>Connect via MCP</h3></div>
      <p class="muted">Any MCP-capable client (e.g. Claude Code) can connect directly to this
        server at <span class="mono">${esc(mcpUrl)}</span> using an API key generated below.</p>
      <pre class="mono">claude mcp add --transport http chuk-experiments ${esc(mcpUrl)} --header "Authorization: Bearer &lt;YOUR_API_KEY&gt;"</pre>
      <p class="muted">Generate a key below and this command will be filled in for you, ready to copy.</p>
    </div>

    <div class="card">
      <div class="hd"><h3>New API key</h3></div>
      <form class="filters" id="new-key-form">
        <input type="text" name="name" placeholder="key name" required>
        ${scopeChoices}
        <button type="submit">Generate</button>
      </form>
      <div id="new-key-box"></div>
    </div>

    <div class="card">
      <div class="hd"><h3>API keys</h3></div>
      <table><tr><th>Name</th><th>Scopes</th><th>Created by</th><th>Created</th><th></th></tr>${keyRows}</table>
    </div>

    ${isAdmin?`
    <div class="card">
      <div class="hd"><h3>Add user</h3></div>
      <form class="filters" id="add-user-form">
        <input type="email" name="email" placeholder="email" required>
        <select name="role"><option value="read">read</option><option value="write">write</option><option value="admin">admin</option></select>
        <button type="submit">Add</button>
      </form>
    </div>
    <div class="card">
      <div class="hd"><h3>Users</h3></div>
      <table><tr><th>Email</th><th>Role</th><th>Added</th><th></th></tr>${userRows}</table>
    </div>`:""}
  `;

  $("#new-key-form").addEventListener("submit",async ev=>{
    ev.preventDefault();
    const fd=new FormData(ev.target);
    const scopes=fd.getAll("scope");
    const box=$("#new-key-box");
    if(!scopes.length){box.innerHTML=`<p class="err">Choose at least one scope</p>`;return;}
    try{
      const created=await api("/v1/keys",{method:"POST",body:JSON.stringify({name:fd.get("name"),scopes})});
      const connectCmd=`claude mcp add --transport http chuk-experiments ${mcpUrl} --header "Authorization: Bearer ${created.raw_key}"`;
      box.innerHTML=`<div class="card"><strong>Copy this now — shown only once</strong>
        <p class="mono" style="word-break:break-all">${esc(created.raw_key)}</p>
        <p class="muted">Connect via MCP:</p>
        <pre class="mono" id="mcp-connect-cmd" style="white-space:pre-wrap">${esc(connectCmd)}</pre>
        <button type="button" data-copy-target="#mcp-connect-cmd">Copy command</button>
        <button type="button" id="new-key-done">Done</button></div>`;
      $("#new-key-done").addEventListener("click",loadTeam);
      ev.target.reset();
    }catch(e){box.innerHTML=`<p class="err">${esc(e.message)}</p>`;}
  });

  if(isAdmin){
    $("#add-user-form").addEventListener("submit",async ev=>{
      ev.preventDefault();
      const fd=new FormData(ev.target);
      try{
        await api("/v1/users",{method:"POST",body:JSON.stringify({email:fd.get("email"),role:fd.get("role")})});
        loadTeam();
      }catch(e){$("#app").insertAdjacentHTML("afterbegin",`<p class="err">${esc(e.message)}</p>`);}
    });
  }

  $("#app").addEventListener("click",async ev=>{
    const keyId=ev.target.dataset.revokeKey;
    const userId=ev.target.dataset.revokeUser;
    const copyTarget=ev.target.dataset.copyTarget;
    if(keyId){await api("/v1/keys/"+keyId,{method:"DELETE"});loadTeam();}
    else if(userId){await api("/v1/users/"+userId,{method:"DELETE"});loadTeam();}
    else if(copyTarget){
      const btn=ev.target,original=btn.textContent;
      await navigator.clipboard.writeText($(copyTarget).textContent);
      btn.textContent="Copied!";
      setTimeout(()=>{btn.textContent=original;},1500);
    }
  });
}

/* ---------------- router ---------------- */
function route(){
  const hash=(location.hash||"#/").slice(1);
  const [path,queryString]=hash.split("?");
  const params=new URLSearchParams(queryString||"");
  let m;
  if((m=path.match(/^\/experiments\/(.+)$/)))loadExperimentDetail(decodeURIComponent(m[1]));
  else if(path==="/experiments")loadExperimentsList(params);
  else if((m=path.match(/^\/runs\/(.+)$/)))loadRunDetail(decodeURIComponent(m[1]));
  else if(path==="/search")loadSearch(params);
  else if(path==="/pins")loadPins();
  else if(path==="/team")loadTeam();
  else loadOverview();
}
window.addEventListener("hashchange",route);
route();
</script>
