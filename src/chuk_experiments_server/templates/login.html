<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — chuk-experiments</title>
<style>
  :root { color-scheme: light dark; --fg: #1a1a1a; --bg: #ffffff; --border: #ddd; }
  @media (prefers-color-scheme: dark) { :root { --fg: #e4e4e7; --bg: #131316; --border: #2c2c33; } }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--fg); background: var(--bg); height: 100vh; margin: 0;
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1.5rem;
  }
  h1 { font-size: 1.1rem; font-weight: 600; }
  .button {
    display: inline-block; padding: 0.6rem 1.2rem; border-radius: 6px;
    background: #2563eb; color: white; text-decoration: none;
  }
  .error { color: #dc2626; max-width: 40ch; text-align: center; }
</style>
</head>
<body>
  <h1>chuk-experiments</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <a class="button" href="/login/google">Sign in with Google</a>
</body>
</html>
