<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — chuk-experiments</title>
<style>
  :root {
    --plane:#0d0d0d; --surface:#1a1a19; --ink:#f4f3ee; --muted:#898781;
    --ring:rgba(255,255,255,.10); --critical:#e0483d; --accent:#3987e5;
    --sans: system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    font-family: var(--sans); color: var(--ink); background: var(--plane);
    height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: var(--surface); border: 1px solid var(--ring); border-radius: 12px;
    padding: 2.2rem 2.5rem; display: flex; flex-direction: column; align-items: center; gap: 1.4rem;
  }
  .brand { font-size: 1.1rem; font-weight: 700; letter-spacing: .02em; }
  .brand b { color: var(--accent); }
  .tag { color: var(--muted); font-size: .82rem; }
  .button {
    display: inline-block; padding: .6rem 1.2rem; border-radius: 8px;
    background: var(--accent); color: #0d0d0d; font-weight: 600; text-decoration: none;
  }
  .button:hover { text-decoration: none; filter: brightness(1.1); }
  .error { color: var(--critical); max-width: 40ch; text-align: center; font-size: .85rem; }
</style>
</head>
<body>
  <div class="card">
    <div><span class="brand">chuk-<b>experiments</b></span><br><span class="tag">research registry</span></div>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <a class="button" href="/login/google">Sign in with Google</a>
  </div>
</body>
</html>
